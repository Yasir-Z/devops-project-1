name: ci-cd

on:
  push:
    branches:
      - main

jobs:
  ci-cd-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: check repo for latest code
      uses: actions/checkout@v4


    - name: install dependencies 
      run: pip install -r requirements.txt

    - name: run the app
      run: python app.py
